<html>
    <body>
        <img id="image" src="../짤/감다뒤.jpg" width="300" height="300">
        <script>
            status = 1
            function changeImage()
            {
            if (status == 1) 
                { document.getElementById("image").src = "../짤/개추.jpg"; 
                status = 2 }
            else
                { document.getElementById("image").src = "../짤/감다뒤.jpg"; 
                status = 1 }
                }
        </script>
        <input type="button" onclick="changeImage()" value="click"/>
    </body>
</html>
