<!DOCTYPE html>
<html>
    <head>
        <meta charset = 'utf-8'/>
    </head>
    <body>
        <script>
            alert(null == undefined);   //true
            alert(null === undefined);   //false    ===는 엄격한 일치 연산자
            alert(true == 1);   //true
            alert(true === 1);   //false            (값과 데이터형의 일치 여부)
            alert(true == '1');   //true
            alert(true === '1');   //false
            alert(0 === -0);   //true
            alert(NaN === NaN);   //false
        </script>
    </body>
</html>
