<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
</head>
<body>
    <script>
        var i = 0;
        var j = 0;
        var k = 0;
        
        while (i++ < 5){
            document.write('while++ coding everybody : ' + i + '<br>');
        }

        while (++j < 5){
            document.write('++while coding everybody : ' + j + '<br>');
        }



        for (var k=0; k<6; k++){
            document.write('for coding everybody : ' + k + '<br>');
        }
    </script>
</body>
</html>
