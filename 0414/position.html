<html>
     <head>
        <meta charset = "utf-8"/>
    </head>
     <body>
        <script = "text/javacript">
        function MyPosition()
        {
            if(navigator.geolocation)
            {
            navigator.geolocation.getCurrentPosition(CurPosition);
            }
        }
        function CurPosition(position)
        {
        var lat = position.coords.latitude;
        var lng = position.coords.longitude;
        document.getElementById("result").innerHTML ="위도:"+lat+" 경도:"+lng;
        }
    </script>
    <button onclick="MyPosition()" type="button">나의 현재 위치</button><p>
    <div id = "result"></div>
 </body>
</html>
