<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
    </head>
    <body>
        <script>
            for (var i=0; i<10; i++){
                if (i === 5) {break;}
                document.write('<i>break coding</i>' + i + '<br>');
            }
            

            for (var j=0; j<10; j++){
                if (j === 5) {continue;}
                document.write('<p><u>continue coding<u>' + j + '<br>');
            }
        </script>
    </body>
</html>
