<html>

        <meta charset="utf-8"/>

    <body>
        <script>
            var colors1 = new Array();
            var colors2 = new Array(5);     // length property : 5
            var colors3 = new Array("red", "blue", "green");
            var colors4 = Array(3);     // new Array()와 동일(new keyword 생략 가능)

            var colors5 = ["red", "blue", "green"];
            var colors6 = [];       // 빈 배열

            alert(colors5[0]);          // red
            colors5[3] = "brown";
            alert(colors5.length);      // 4
        </script>
    </body>
