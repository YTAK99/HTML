<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
    </head>
    <body>
        <script>
            function displayInfo(args)
            {
                var output = "";

                if(typeof args.name == "string")
                { output += "Name : " + args.name + "\n"; }
                
                if(typeof args.age == "number")
                { output += "Age : " + args.age + "\n"; }
                
                alert(output);
                alert(args.age);
            }

            displayInfo({               // displayInfo("Nicholas", 29); 라고 보면 됨
                name: "Nicholas",
                age: 29
            });
            
            displayInfo({          // displayInfo() 괄호 안에 {} 객체(json같은 데이터)
                name: "Greg"        // typeof로 체크하기 때문에 age 없어도 에러 안남.
            });
        </script>
    </body>
</html>
