<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
    </head>
    <body>
        <script>
            var person1 = 
            {
                toLocaleString : function() { return "Nikolas"; },
                toString : function() { return "Nicholas"; }      // 객체를 문자화
            };

            var person2 = 
            {
                toLocaleString : function() { return "Grigorios"; },
                toString : function() { return "Greg"; }
            };

            var people = [person1, person2];
            alert(people);                      // Nicholas, Greg
            alert(people.toString());           // Nicholas, Greg
            alert(people.toLocaleString());      // Nicholas, Grigorios
        </script>
    </body>
</html>
